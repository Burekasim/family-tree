name: Deploy Family Tree

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  STACK_NAME: family-tree

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install Lambda dependencies
        run: |
          cd backend
          npm install --production

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ vars.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              DomainName=${{ vars.DOMAIN_NAME }} \
              CertificateArn=${{ vars.CERTIFICATE_ARN }} \
              ApiToken=${{ secrets.API_TOKEN }}

      - name: Get stack outputs
        id: outputs
        run: |
          CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          echo "cloudfront_url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Generate config.js
        run: |
          cat > public/config.js << 'CONFIGEOF'
          window.APP_CONFIG = {
            apiBase: '',
            usePresignedUpload: true
          };
          CONFIGEOF

      - name: Sync frontend to S3
        id: sync
        run: |
          BUCKET="${{ steps.outputs.outputs.bucket }}"

          # Static assets — 30-minute cache
          OUT1=$(aws s3 sync public/ s3://$BUCKET/ \
            --delete \
            --cache-control "public, max-age=1800" \
            --exclude "*.html" --exclude "config.js")

          # HTML + config — always revalidate
          OUT2=$(aws s3 sync public/ s3://$BUCKET/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html" --include "config.js")

          echo "$OUT1"
          echo "$OUT2"

          # Only invalidate if something actually changed
          if [ -n "$OUT1" ] || [ -n "$OUT2" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Invalidate CloudFront cache
        if: steps.sync.outputs.changed == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/*"

      - name: Done
        run: echo "Deployed to ${{ steps.outputs.outputs.cloudfront_url }}"
